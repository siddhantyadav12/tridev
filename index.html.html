<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tridev Palace — Hero Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ivory:#F7F2E9;
    --ink:#2A211C;
    --wine:#6E1F2B;
    --wine-deep:#4F1620;
    --gold:#C79A3E;
    --gold-soft:#E4C67A;
    --night:#191512;
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'Work Sans',sans-serif; background:var(--night);}
  a{text-decoration:none; color:inherit;}

  /* ---- Top info bar ---- */
  .infobar{
    background:var(--night);
    color:rgba(247,242,233,0.75);
    font-size:13px;
    position:relative;
    z-index:110;
  }
  .infobar .wrap{
    max-width:1240px; margin:0 auto; padding:8px 28px;
    display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap;
  }
  .infobar a{color:var(--gold-soft);}
  .infobar-links{display:flex; gap:22px; flex-wrap:wrap;}

  /* ---- Nav ---- */
  .site-header{
    position:sticky; top:0; z-index:100;
    background:rgba(25,21,18,0.35);
    backdrop-filter:blur(6px);
    border-bottom:1px solid rgba(247,242,233,0.14);
  }
  .site-header .wrap{
    max-width:1240px; margin:0 auto; padding:18px 28px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .logo{
    font-family:'Great Vibes', cursive;
    font-size:32px;
    color:var(--ivory);
    letter-spacing:0.01em;
  }
  .nav-links{display:flex; align-items:center; gap:34px;}
  .nav-links a{
    font-size:13px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase;
    color:var(--ivory); position:relative; padding:4px 0;
  }
  .nav-links a.active{color:var(--gold-soft);}
  .nav-links a:not(.btn)::after{
    content:""; position:absolute; left:0; right:0; bottom:-3px; height:2px;
    background:var(--gold); transform:scaleX(0); transform-origin:left; transition:transform .25s ease;
  }
  .nav-links a:not(.btn):hover::after, .nav-links a.active::after{transform:scaleX(1);}
  .btn{
    display:inline-flex; align-items:center; gap:8px;
    padding:11px 22px; font-size:13px; font-weight:600; letter-spacing:0.05em;
    border-radius:2px; border:1px solid var(--gold-soft); color:var(--ivory);
    transition:all .2s ease;
  }
  .btn:hover{background:var(--gold-soft); color:var(--night); border-color:var(--gold-soft);}

  .nav-toggle{display:none; flex-direction:column; gap:5px; background:none; border:none; cursor:pointer; padding:6px;}
  .nav-toggle span{width:24px; height:2px; background:var(--ivory); display:block;}

  /* ---- Hero ---- */
  .hero{
    position:relative;
    min-height:88vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:var(--ivory);
    overflow:hidden;
  }
  .hero img{
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center 35%;
  }
  .hero::before{
    content:"";
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse at center, rgba(20,15,12,0.72) 0%, rgba(20,15,12,0.58) 45%, rgba(20,15,12,0.42) 75%),
      linear-gradient(0deg, rgba(15,11,9,0.75) 0%, rgba(15,11,9,0.25) 40%, rgba(15,11,9,0.35) 100%);
  }
  .hero-content{
    position:relative;
    max-width:760px;
    padding:0 28px;
  }
  .eyebrow{
    font-size:14px;
    letter-spacing:0.42em;
    text-transform:uppercase;
    font-weight:600;
    color:var(--ivory);
    margin:0 0 18px;
  }
  .hero h1{
    font-family:'Great Vibes', cursive;
    font-weight:400;
    font-size:clamp(58px, 9vw, 108px);
    line-height:1;
    margin:0;
    color:#fff;
    text-shadow:0 2px 30px rgba(0,0,0,0.35);
  }
  .hero .sub{
    margin-top:22px;
    font-size:15px;
    letter-spacing:0.32em;
    text-transform:uppercase;
    font-weight:500;
    color:rgba(247,242,233,0.92);
  }
  .hero .cta{
    margin-top:40px;
    display:inline-flex;
    align-items:center;
    gap:10px;
    background:var(--ivory);
    color:var(--wine-deep);
    padding:16px 38px;
    font-size:13px;
    font-weight:700;
    letter-spacing:0.14em;
    text-transform:uppercase;
    border-radius:1px;
    transition:all .2s ease;
  }
  .hero .cta:hover{background:var(--gold-soft); color:var(--night);}

  @media (max-width:720px){
    .nav-links{
      position:absolute; top:100%; left:0; right:0;
      background:rgba(25,21,18,0.96);
      flex-direction:column; align-items:flex-start;
      padding:20px 28px 28px; gap:18px;
      display:none;
    }
    .nav-links.open{display:flex;}
    .nav-toggle{display:flex;}
    .infobar .wrap{justify-content:center; text-align:center;}
    .hero .sub{letter-spacing:0.18em; font-size:13px;}
  }
</style>
</head>
<body>

<div class="infobar">
  <div class="wrap">
    <div class="infobar-links">
      <a href="tel:+919857827544">+91 98578 27544</a>
      <a href="mailto:tridevpalace03@gmail.com">tridevpalace03@gmail.com</a>
    </div>
    <span>Pyuthan, Nepal</span>
  </div>
</div>

<header class="site-header">
  <div class="wrap">
    <a href="#" class="logo">Tridev Palace</a>
    <nav class="nav-links">
      <a href="#" class="active">Home</a>
      <a href="#">Rooms</a>
      <a href="#">Events</a>
      <a href="#">Contact</a>
      <a href="tel:+919857827544" class="btn">Call to Book</a>
    </nav>
    <button class="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</header>

<section class="hero">
  <img src="images/hero-reception.jpg" alt="Tridev Palace reception desk">
  <div class="hero-content">
    <p class="eyebrow">Welcome To</p>
    <h1>Tridev Palace</h1>
    <p class="sub">Hotel &amp; Lodging</p>
    <a href="#" class="cta">Learn More</a>
  </div>
</section>

<script>
  document.querySelector('.nav-toggle').addEventListener('click', function(){
    document.querySelector('.nav-links').classList.toggle('open');
  });
</script>
</body>
</html>
